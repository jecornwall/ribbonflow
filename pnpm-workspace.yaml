# Flow Designer project — pnpm workspace.
#
# The flow-designer project lives entirely under flow/. M1 ships the shared
# library; M3 adds the interactive designer app at flow/designer/.
packages:
  - library
  - designer
  # M5 parity-validation harness (bd ai-engineer-h6sn). Scratch tooling that
  # renders the deck's real flows through the new library for the swap audit;
  # not a shipped artefact.
  - parity
  # Phase 3 adapter packages — thin framework shells over mountFlowAuto.
  - adapters/vue
  - adapters/react
  # Playwright smoke runner for both adapters (Task 6).
  - adapters
  # Phase 5 flow-collection build CLI (bd ai-engineer-s097). Validates/normalizes
  # a flows dir through the library format layer, emits an asset bundle + a static
  # gallery. Becomes @ribbonflow/cli at the repo split.
  - cli
