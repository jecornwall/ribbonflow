# ribbonflow — pnpm workspace.
#
# The published package set (spec §2):
#   @ribbonflow/core     — pure, headless: simulation, geometry, scene model, format
#   ribbonflow           — vanilla SVG renderer (mountFlow); re-exports core
#   @ribbonflow/vue      — thin <FlowEmbed> wrapper over ribbonflow
#   @ribbonflow/react    — thin <FlowEmbed> wrapper over ribbonflow
#   @ribbonflow/designer — the interactive builder app (Vue)
#   @ribbonflow/cli      — flow-collection build tool (asset bundle + static gallery)
packages:
  - core
  - ribbonflow
  - adapters/vue
  - adapters/react
  # Playwright smoke runner for both framework adapters.
  - adapters
  - designer
  - cli
